<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | HousingBase</title>
  <link rel="icon" href="/image/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/image/apple-touch-icon.png" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="bg-dots" style="position:fixed;inset:0;background:radial-gradient(circle,rgba(50,50,50,0.12) 1.5px,transparent 0);background-size:24px 24px;z-index:0;pointer-events:none;mix-blend-mode:screen;"></div>

  <header>
    <div class="logo"><a href="/index.html"><img src="image/blueblue.png" alt="HousingBase" /></a></div>
    <div class="hamburger"><span></span><span></span><span></span></div>
    <nav class="nav-links">
      <a href="/housing.html">Housing Browser</a>
      <a href="/fcm.html">FCM</a>
      <a href="/news.html">News</a>
      <a href="/browser.html">HTSL Library</a>
      <div id="logged-out" style="display:flex;align-items:center;"><a href="/login.html"><button class="primary-btn">Sign In</button></a></div>
      <div id="logged-in" style="display:none;align-items:center;">
        <img id="avatarSmall" width="32" height="32" alt="Avatar" />
        <span id="displayName" style="margin-left:8px;font-weight:600;color:#fff;cursor:pointer;display:none;"></span>
      </div>
    </nav>
  </header>

  <div id="announcement"></div>

  <div class="auth-wrap">
    <div class="auth-card">
      <h2>Create account</h2>

      <div class="auth-field">
        <label>Username <span style="color:#2a2a2a;font-weight:400;">(A-Z, 0-9, _ — max 20)</span></label>
        <input type="text" id="username" placeholder="coolbuilder99" maxlength="20" autocomplete="username" />
      </div>

      <div class="auth-field">
        <label>Display Name</label>
        <input type="text" id="displayNameInput" placeholder="Cool Builder" maxlength="32" />
      </div>

      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="auth-field">
        <label>Password <span style="color:#2a2a2a;font-weight:400;">(min 6 chars)</span></label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" />
      </div>

      <button class="primary-btn auth-submit" id="registerBtn">Create Account</button>

      <div class="auth-status" id="status"></div>

      <div class="auth-footer">Already have an account? <a href="/login.html">Sign in</a></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-top">
        <img src="/image/fullwhite.png" alt="HousingBase" class="footer-logo" />
      </div>
      <div class="footer-links"><a href="/index.html">About</a><a href="/contact.html">Contact</a><a href="/terms.html">Terms</a></div>
      <p class="footer-credit">&copy; 2025 <b>HousingBase</b>. All Rights Reserved</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script src="register.js"></script>
</body>
</html>
