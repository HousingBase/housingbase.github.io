  text-align: center;

}
.drop-zone:hover,
.drop-zone.over {

  background: var(--blue-dim);
  box-shadow: 0 0 0 4px rgba(37,100,235,0.06);
}
.drop-zone-icon {
  width: 48px;
  height: 48px;
  margin: 0 auto 0.8rem;
  color: #222;
  transition: color 0.2s;
}
.drop-zone:hover .drop-zone-icon,
.drop-zone.over .drop-zone-icon {
  color: var(--blue);
}
.file-chip {
  display: none;
  align-items: center;
  gap: 9px;
  background: var(--blue-dim);
  border: 1px solid var(--blue-border);
  border-radius: 9px;
  padding: 10px 14px;
  margin-top: 10px;
  font-size: 0.86rem;

}
.file-chip.visible { display: flex; }
.chip-name { flex: 1; font-weight: 500; }
.chip-size { color: #2a4a7a; font-size: 0.78rem; }
.chip-remove {
  cursor: pointer;
  color: #2a4a7a;
  transition: color 0.15s;
  flex-shrink: 0;
}
.chip-remove:hover { color: #f87171; }

<script>
const API = "https://housingbase-71z.onrender.com";
const id = new URLSearchParams(location.search).get("id");

function bindCounter(id, cid, max) {
  const i = document.getElementById(id), c = document.getElementById(cid);
  i.addEventListener("input", () => {
    const l = i.value.length;
    c.textContent = `${l}/${max}`;
    c.classList.toggle("full", l >= max);
  });
}

bindCounter("name","nameCounter",30);
bindCounter("short","shortCounter",50);
bindCounter("desc","descCounter",2000);

async function load() {
  const token = localStorage.getItem("authToken");

  const res = await fetch(`${API}/api/addons/${id}`, {
    headers: { Authorization: `Bearer ${token}` }
  });

  if (!res.ok) {
    location.href = "/dashboard.html";
    return;
  }

  const a = await res.json();
  const me = await getMe();

  if (!me || (me.username !== a.username && !me.is_admin)) {
    location.href = "/dashboard.html";
    return;
  }

  document.getElementById("name").value = a.name;
  document.getElementById("short").value = a.short_description || "";
  document.getElementById("desc").value = a.description || "";

  // update counters
  document.getElementById("nameCounter").textContent = `${a.name.length}/30`;
  document.getElementById("shortCounter").textContent = `${(a.short_description||"").length}/50`;
  document.getElementById("descCounter").textContent = `${(a.description||"").length}/2000`;
}

document.getElementById("saveBtn").onclick = async () => {
  const token = localStorage.getItem("authToken");

  const form = new FormData();
  form.append("name", document.getElementById("name").value);
  form.append("short_description", document.getElementById("short").value);
  form.append("description", document.getElementById("desc").value);

  const file = document.getElementById("file").files[0];
  if (file) form.append("file", file);

  const res = await fetch(`${API}/api/addons/${id}`, {
    method: "PATCH",
    headers: { Authorization: `Bearer ${token}` },
    body: form
  });

  if (res.ok) {
    location.href = "/dashboard.html";
  } else {
    alert("Failed to update");
  }
};

load();
</script>

<script>
const dropZone = document.getElementById("drop-zone");
const fileInput = document.getElementById("file");
const fileChip = document.getElementById("file-chip");

function fmtBytes(b) {
  if (b < 1024) return b + " B";
  if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
  return (b / 1048576).toFixed(1) + " MB";
}

function setFile(f) {
  if (!f.name.endsWith(".htsl")) {
    alert("Only .htsl files are allowed");
    return;
  }

  document.getElementById("chip-name").textContent = f.name;
  document.getElementById("chip-size").textContent = fmtBytes(f.size);

  fileChip.classList.add("visible");
  dropZone.style.display = "none";
}

dropZone.addEventListener("click", () => fileInput.click());

dropZone.addEventListener("dragover", e => {
  e.preventDefault();
  dropZone.classList.add("over");
});

dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("over");
});

dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("over");

  const f = e.dataTransfer.files[0];
  if (f) {
    const dt = new DataTransfer();
    dt.items.add(f);
    fileInput.files = dt.files;
    setFile(f);
  }
});

fileInput.addEventListener("change", () => {
  if (fileInput.files[0]) setFile(fileInput.files[0]);
});

document.getElementById("chip-remove").addEventListener("click", () => {
  fileInput.value = "";
  fileChip.classList.remove("visible");
  dropZone.style.display = "";
});
</script>
