<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/image/favicon.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <title>Housium | HousingBase</title>

  <style>
    body { overflow-x: hidden; }
    .addon-page { max-width: 900px; margin: 0 auto; padding: 5.5rem 1.5rem 3rem; }

    .ap-layout { display: grid; grid-template-columns: 1fr 280px; gap: 24px; }

    .ap-title { font-size: 1.7rem; font-weight: 700; margin-bottom: 0.5rem; }
    .ap-meta { display: flex; gap: 10px; font-size: 0.84rem; color: #555; margin-bottom: 1rem; }

    .ap-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.4rem; }
    .ap-tab { padding: 0.55rem 1rem; font-size: 0.86rem; cursor: pointer; color: #555; border-bottom: 2px solid transparent; }
    .ap-tab.active { color: var(--text); border-bottom-color: var(--blue); }

    .ap-panel { display: none; }
    .ap-panel.active { display: block; }

    .ap-description { color: #ccc; line-height: 1.8; }

    .ap-card { background: rgba(10,10,10,0.8); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem; margin-bottom: 12px; }

    .download-badges {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .download-badges img {
      height: 46px;
      transition: 0.15s;
    }

    .download-badges a:hover img {
      transform: translateY(-2px);
    }

    @media (max-width: 720px) {
      .ap-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<!-- HEADER (UNCHANGED) -->
<header>
  <div class="logo"><a href="/index.html"><img src="image/blueblue.png" /></a></div>
  <nav class="nav-links">
    <a href="/housing.html">Housing Browser</a>
    <a href="/fcm.html">FCM</a>
    <a href="/news.html">News</a>
    <a href="/browser.html">HTSL Library</a>
    <a href="/dashboard.html">Dashboard</a>
  </nav>
</header>

<div class="addon-page">

  <div class="ap-layout">

    <!-- MAIN -->
    <div>

      <h1 class="ap-title">Housium</h1>
      <div class="ap-meta">by YourName • Apr 2026</div>

      <!-- TABS -->
      <div class="ap-tabs">
        <div class="ap-tab active" data-panel="description">Description</div>
        <div class="ap-tab" data-panel="download">Download</div>
      </div>

      <!-- DESCRIPTION -->
      <div class="ap-panel active" id="panel-description">
        <div class="ap-description">
          <p><strong>Housium</strong> is a powerful housing system.</p>
          <ul>
            <li>Menus</li>
            <li>Stats</li>
            <li>Triggers</li>
          </ul>
        </div>
      </div>

      <!-- DOWNLOAD TAB -->
      <div class="ap-panel" id="panel-download">
        <div class="ap-card">

          <div class="download-badges">

            <!-- MODRINTH -->
            <a href="https://modrinth.com/project/YOUR_PROJECT" target="_blank">
              <img src="https://raw.githubusercontent.com/modrinth/art/main/Branding/badge/badge-dark.svg">
            </a>

            <!-- CURSEFORGE -->
            <a href="https://curseforge.com/minecraft/YOUR_PROJECT" target="_blank">
              <img src="https://img.shields.io/badge/Download-CurseForge-f16436?style=for-the-badge&logo=curseforge&logoColor=white">
            </a>

            <!-- GITHUB -->
            <a href="https://github.com/YOUR_REPO" target="_blank">
              <img src="https://img.shields.io/badge/View-GitHub-181717?style=for-the-badge&logo=github">
            </a>

          </div>

        </div>
      </div>

    </div>

    <!-- SIDEBAR (KEPT STYLE) -->
    <aside>

      <div class="ap-card">
        <a href="#" class="ap-dl-btn">Download File</a>
      </div>

      <div class="ap-card">
        <h3>Details</h3>
        <div>Downloads: 1,234</div>
        <div>Uploaded: Apr 2026</div>
        <div>Category: utility</div>
      </div>

      <div class="ap-card">
        <h3>Author</h3>
        <div>YourName</div>
      </div>

    </aside>

  </div>

</div>

<!-- TAB SCRIPT -->
<script>
document.querySelectorAll(".ap-tab").forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll(".ap-tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".ap-panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("panel-" + tab.dataset.panel).classList.add("active");
  };
});
</script>

</body>
</html>
