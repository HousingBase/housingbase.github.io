<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/image/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/image/apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <title>Profile | HousingBase</title>
  <style>
    body { overflow-x: hidden; }
    .profile-wrap { max-width: 820px; margin: 0 auto; padding: 5rem 1.5rem 3rem; position: relative; z-index: 2; }
    .profile-hero { display: flex; align-items: flex-start; gap: 1.8rem; margin-bottom: 2rem; }
    .avatar-wrap { position: relative; flex-shrink: 0; }
    .profile-avatar { width: 100px; height: 100px; border-radius: 13px; object-fit: cover; display: block; border: 1px solid rgba(255,255,255,0.08); }
    .avatar-edit-overlay { position: absolute; inset: 0; border-radius: 13px; background: rgba(0,0,0,0.7); display: none; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 0.75rem; color: #fff; font-weight: 600; gap: 4px; }
    .avatar-wrap:hover .avatar-edit-overlay { display: flex; }
    #avatarFile { display: none; }
    .profile-meta { flex: 1; min-width: 0; }
    .profile-displayname { font-size: 1.6rem; font-weight: 700; margin: 0 0 0.15rem; }
    .profile-username { font-size: 0.85rem; color: #444; margin: 0 0 0.6rem; }
    .profile-bio { font-size: 0.88rem; color: #888; margin: 0 0 0.9rem; line-height: 1.5; }
    .profile-stats { display: flex; gap: 1.4rem; }
    .stat-pill .num { font-size: 1.15rem; font-weight: 700; color: #fff; line-height: 1; }
    .stat-pill .lbl { font-size: 0.68rem; color: #444; text-transform: uppercase; letter-spacing: 0.07em; margin-top: 2px; }
    .profile-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 1.8rem 0; }
    .section-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.9rem; }
    .section-hdr h2 { font-size: 0.7rem; font-weight: 700; color: #333; text-transform: uppercase; letter-spacing: 0.1em; margin: 0; }
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 11px; }
    .edit-panel { background: rgba(8,8,8,0.8); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 1.3rem 1.4rem; margin-bottom: 14px; }
    .edit-panel h3 { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #333; margin: 0 0 1.1rem; }
    .edit-row { display: grid; grid-template-columns: 1fr auto; gap: 7px; align-items: end; margin-bottom: 9px; }
    .edit-row label { grid-column: 1/-1; font-size: 0.76rem; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: -2px; }
    .edit-row input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 0.58rem 0.85rem; color: #e8e8e8; font-size: 0.86rem; font-family: "Inter",sans-serif; transition: all 0.18s; width: 100%; box-sizing: border-box; }
    .edit-row input:focus { outline: none; border-color: #2564eb; background: rgba(37,100,235,0.06); box-shadow: 0 0 0 3px rgba(37,100,235,0.1); }
    .edit-row .save-btn { background: #2564eb; color: #fff; border: none; border-radius: 8px; padding: 0.58rem 0.9rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
    .edit-row .save-btn:hover { background: #1d4ed8; transform: translateY(-1px); }
    .admin-panel { background: rgba(8,8,8,0.8); border: 1px solid rgba(245,158,11,0.18); border-radius: 14px; padding: 1.3rem 1.4rem; margin-bottom: 14px; }
    .admin-panel h3 { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #78450a; margin: 0 0 1.1rem; }
    .ann-row { display: flex; flex-direction: column; gap: 7px; }
    .ann-row input[type="text"] { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 0.58rem 0.85rem; color: #e8e8e8; font-size: 0.86rem; font-family: "Inter",sans-serif; width: 100%; box-sizing: border-box; }
    .ann-row input[type="text"]:focus { outline: none; border-color: #f59e0b; }
    .ann-colors { display: flex; align-items: center; gap: 10px; font-size: 0.78rem; color: #555; }
    .ann-colors input[type="color"] { width: 32px; height: 26px; border: none; background: none; cursor: pointer; border-radius: 4px; }
    .ann-btns { display: flex; gap: 7px; align-items: center; }
    .ann-save { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); border-radius: 8px; padding: 0.55rem 1rem; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.18s; }
    .ann-save:hover { background: rgba(245,158,11,0.25); }
    .ann-clear { background: rgba(255,255,255,0.04); color: #555; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 0.55rem 1rem; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.18s; }
    .ann-clear:hover { background: rgba(235,68,68,0.12); color: #fca5a5; border-color: rgba(235,68,68,0.3); }
    @media (max-width: 580px) { .profile-hero { flex-direction: column; gap: 1rem; } .profile-avatar { width: 76px; height: 76px; } .projects-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="logo"><a href="/index.html"><img src="image/blueblue.png" alt="HousingBase Logo"></a></div>
    <div class="hamburger"><span></span><span></span><span></span></div>
    <nav class="nav-links">
      <a href="/housing.html">Housing Browser</a>
      <a href="/fcm.html">FCM</a>
      <a href="/news.html">News</a>
      <a href="/browser.html">HTSL Library</a>
      <a href="/dashboard.html">Dashboard</a>
      <a href="/projects.html">Projects</a>
      <div id="logged-out" style="display:flex;align-items:center;">
        <a href="/login.html"><button class="primary-btn">Sign In</button></a>
      </div>
      <div id="logged-in" style="display:none;align-items:center;">
        <img id="avatarSmall" width="32" height="32" alt="Avatar" style="border-radius:6px;cursor:pointer;margin-left:8px;">
        <span id="displayName" style="margin-left:8px;font-weight:600;color:#fff;cursor:pointer;display:none;"></span>
      </div>
    </nav>
  </header>

  <div id="announcement"></div>

  <div class="profile-wrap">
    <div class="profile-hero">
      <div class="avatar-wrap">
        <img id="avatar" src="" alt="Avatar" class="profile-avatar" width="100" height="100" />
        <div class="avatar-edit-overlay" id="avatarEditOverlay" style="display:none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <span>Change</span>
        </div>
        <input type="file" id="avatarFile" accept=".png,.jpg,.jpeg,.webp" />
      </div>
      <div class="profile-meta">
        <h1 class="profile-displayname" id="profileDisplayName"></h1>
        <p class="profile-username" id="profileUsername"></p>
        <p class="profile-bio" id="profileBio"></p>
        <div class="profile-stats">
          <div class="stat-pill"><div class="num" id="statProjects">0</div><div class="lbl">Projects</div></div>
          <div class="stat-pill"><div class="num" id="statDownloads">0</div><div class="lbl">Downloads</div></div>
          <div class="stat-pill"><div class="num" id="statLikes">0</div><div class="lbl">Likes</div></div>
        </div>
      </div>
    </div>

    <div id="owner-panel" class="edit-panel" style="display:none;">
      <h3>Edit Profile</h3>
      <div class="edit-row">
        <label>Display Name <span style="color:#2a2a2a;text-transform:none;font-weight:400;">(7-day cooldown)</span></label>
        <input type="text" id="displayInput" placeholder="Your display name" maxlength="32" />
        <button class="save-btn" id="saveDisplay">Save</button>
      </div>
      <div class="edit-row">
        <label>Bio</label>
        <input type="text" id="bioInput" placeholder="Tell people about yourself…" maxlength="100" />
        <button class="save-btn" id="saveBio">Save</button>
      </div>
    </div>

    <div id="admin-panel" class="admin-panel" style="display:none;">
      <h3>Site Announcement</h3>
      <div class="ann-row">
        <input type="text" id="annText" placeholder="Announcement message…" maxlength="200" />
        <div class="ann-colors">
          <span>Background</span><input type="color" id="annBg" value="#92400e" />
          <span>Text</span><input type="color" id="annColor" value="#fef3c7" />
        </div>
        <div class="ann-btns">
          <button class="ann-save" id="saveAnn">Post</button>
          <button class="ann-clear" id="clearAnn">Clear</button>
          <span id="annStatus" style="font-size:0.8rem;color:#4ade80;"></span>
        </div>
      </div>
    </div>

    <div class="profile-divider"></div>

    <div class="section-hdr"><h2>Projects</h2></div>
    <div class="projects-grid" id="profile-addon-list"></div>
  </div>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-top">
        <img src="/image/fullwhite.png" alt="HousingBase Logo" class="footer-logo" />
        <div class="social-icons">
          <a href="https://www.youtube.com/@spigotbase" target="_blank" aria-label="YouTube">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M23.498 6.186a2.97 2.97 0 0 0-2.09-2.103C19.505 3.5 12 3.5 12 3.5s-7.505 0-9.408.583a2.97 2.97 0 0 0-2.09 2.103A31.4 31.4 0 0 0 .5 12a31.4 31.4 0 0 0 .002 5.814 2.97 2.97 0 0 0 2.09 2.103C4.495 20.5 12 20.5 12 20.5s7.505 0 9.408-.583a2.97 2.97 0 0 0 2.09-2.103A31.4 31.4 0 0 0 23.5 12a31.4 31.4 0 0 0-.002-5.814z"/><path d="M9.75 15.02v-6.04L15.5 12l-5.75 3.02z" fill="black"/></svg>
          </a>
          <a href="https://github.com/spigotbase" target="_blank" aria-label="GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.648.5.5 5.648.5 12c0 5.096 3.292 9.417 7.863 10.95.575.104.785-.25.785-.556v-1.94c-3.2.694-3.875-1.544-3.875-1.544-.524-1.329-1.28-1.682-1.28-1.682-1.046-.716.08-.7.08-.7 1.157.08 1.766 1.188 1.766 1.188 1.03 1.767 2.704 1.257 3.364.96.104-.747.403-1.257.732-1.546-2.553-.29-5.238-1.276-5.238-5.68 0-1.256.448-2.283 1.183-3.087-.12-.29-.512-1.468.112-3.06 0 0 .964-.31 3.162 1.18A10.98 10.98 0 0 1 12 6.845a10.9 10.9 0 0 1 2.88.39c2.197-1.49 3.162-1.18 3.162-1.18.624 1.592.232 2.77.112 3.06.735.804 1.183 1.83 1.183 3.087 0 4.418-2.69 5.385-5.26 5.67.416.36.784 1.077.784 2.174v3.22c0 .31.208.67.792.555C20.21 21.41 23.5 17.09 23.5 12 23.5 5.648 18.352.5 12 .5z"/></svg>
          </a>
        </div>
      </div>
      <div class="footer-links"><a href="/index.html">About</a><a href="/contact.html">Contact</a><a href="/terms.html">Terms</a></div>
      <p class="footer-credit">&copy; 2025 <b>HousingBase</b>. All Rights Reserved</p>
    </div>
  </footer>

  <div id="modal-overlay" class="modal-overlay">
    <div id="modal-box" class="modal-box">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <span id="modal-close" class="modal-close">&times;</span>
      </div>
      <div class="modal-body">
        <p class="modal-desc" id="modal-desc"></p>
        <a id="modal-download" class="modal-dl-btn">Download .htsl</a>
        <div class="modal-code-label">File Contents</div>
        <pre class="modal-pre" id="modal-pre">Loading…</pre>
      </div>
    </div>
  </div>

  <div id="del-confirm-overlay">
    <div id="del-confirm-box">
      <div class="del-modal-header">
        <h3>Delete Project?</h3>
        <span class="del-modal-close" id="del-confirm-close">&times;</span>
      </div>
      <div class="del-modal-body">
        <p id="del-confirm-desc"></p>
        <div class="del-actions" style="margin-top:1rem;">
          <button class="danger-btn" id="del-confirm-yes">Delete</button>
          <button class="secondary-btn" id="del-confirm-no">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    const API_BASE_P = "https://housingbase-71z.onrender.com";

    function avURL(p) {
      if (!p) return `${API_BASE_P}/uploads/avatars/default.png`;
      if (p.startsWith("http")) return p;
      return `${API_BASE_P}/${p.replace(/^\/?/, "")}`;
    }

    function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function fmtDate(ts) { if (!ts) return ""; return new Date(ts).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); }

    async function loadProfile() {
      const params = new URLSearchParams(location.search);
      const username = params.get("user");
      if (!username) { document.body.textContent = "No user specified."; return; }

      const token = localStorage.getItem("authToken");
      const [profileRes, me] = await Promise.all([
        fetch(`${API_BASE_P}/api/users/${username}`, { headers: { Authorization: `Bearer ${token||""}` } }),
        getMe()
      ]);

      if (!profileRes.ok) { document.querySelector(".profile-wrap").innerHTML = "<p style='color:#555;padding:2rem;'>User not found.</p>"; return; }
      const data = await profileRes.json();

      renderAuth(me);

      document.getElementById("profileDisplayName").textContent = data.displayName || data.username;
      document.getElementById("profileUsername").textContent = "@" + data.username;
      document.getElementById("profileBio").textContent = data.bio || "";
      document.getElementById("avatar").src = avURL(data.avatar);
      document.title = `${data.displayName || data.username} | HousingBase`;

      const addons = data.addons || [];
      document.getElementById("statProjects").textContent = addons.length;
      document.getElementById("statDownloads").textContent = addons.reduce((s,a)=>s+(a.downloads||0),0);
      document.getElementById("statLikes").textContent = addons.reduce((s,a)=>s+(a.likes||0),0);

      const isOwner = me && me.username === data.username;
      const isAdmin = me?.is_admin;

      if (isOwner || isAdmin) {
        const ov = document.getElementById("avatarEditOverlay");
        ov.style.display = "flex";
        ov.onclick = () => document.getElementById("avatarFile").click();
        document.getElementById("avatarFile").onchange = async function() {
          const f = this.files[0];
          if (!f) return;
          const form = new FormData();
          form.append("avatar", f);
          const r = await fetch(`${API_BASE_P}/api/me/avatar`, { method:"POST", headers:{ Authorization:`Bearer ${token}` }, body: form });
          const out = await r.json();
          if (r.ok) {
            showToast("Avatar updated!");
            const ts = "?t=" + Date.now();
            document.getElementById("avatar").src = avURL(out.avatar) + ts;
            const sm = document.getElementById("avatarSmall");
            if (sm) sm.src = avURL(out.avatar) + ts;
          } else showToast(out.error || "Failed to update avatar", "error");
        };
      }

      if (isOwner) {
        document.getElementById("owner-panel").style.display = "block";
        document.getElementById("bioInput").value = data.bio || "";
        document.getElementById("displayInput").value = data.displayName || "";

        document.getElementById("saveBio").onclick = async () => {
          const bio = document.getElementById("bioInput").value.trim();
          const r = await fetch(`${API_BASE_P}/api/me/bio`, {
            method:"POST", headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},
            body: JSON.stringify({ bio })
          });
          const out = await r.json();
          if (r.ok) { showToast("Bio updated!"); document.getElementById("profileBio").textContent = bio; }
          else showToast(out.error || "Failed", "error");
        };

        document.getElementById("saveDisplay").onclick = async () => {
          const displayName = document.getElementById("displayInput").value.trim();
          if (!displayName) { showToast("Display name cannot be empty", "error"); return; }
          const r = await fetch(`${API_BASE_P}/api/me/display`, {
            method:"POST", headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},
            body: JSON.stringify({ displayName })
          });
          const out = await r.json();
          if (r.ok) { showToast("Display name updated!"); document.getElementById("profileDisplayName").textContent = displayName; }
          else showToast(out.error || "Failed", "error");
        };
      }

      if (isAdmin) {
        document.getElementById("admin-panel").style.display = "block";
        document.getElementById("saveAnn").onclick = async () => {
          const text = document.getElementById("annText").value.trim();
          const bg_color = document.getElementById("annBg").value;
          const text_color = document.getElementById("annColor").value;
          const r = await fetch(`${API_BASE_P}/api/announcement`, {
            method:"POST", headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},
            body: JSON.stringify({ text, bg_color, text_color })
          });
          if (r.ok) { showToast("Announcement posted!"); document.getElementById("annStatus").textContent = "Posted"; await loadAnnouncement(); }
          else showToast("Failed", "error");
        };
        document.getElementById("clearAnn").onclick = async () => {
          const r = await fetch(`${API_BASE_P}/api/announcement`, {
            method:"POST", headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},
            body: JSON.stringify({ text: "" })
          });
          if (r.ok) { showToast("Announcement cleared"); document.getElementById("annStatus").textContent = "Cleared"; await loadAnnouncement(); }
        };
      }

      const list = document.getElementById("profile-addon-list");
      list.innerHTML = "";

      if (!addons.length) {
        list.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:2.5rem;color:#333;"><p>No public projects yet</p></div>`;
        return;
      }

      addons.forEach(a => {
        const id = a._id || a.id;
        const card = document.createElement("div");
        card.className = "addon-card";
        card.style.paddingBottom = "2.4rem";

        const h4 = document.createElement("h4");
        h4.textContent = a.name;
        card.appendChild(h4);

        const desc = document.createElement("p");
        desc.className = "desc";
        desc.textContent = a.description || "No description";
        card.appendChild(desc);

        const meta = document.createElement("div");
        meta.className = "meta-row";
        meta.style.cssText = "display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:6px;font-size:0.76rem;color:#3a3a3a;";
        if (a.category) {
          const cb = document.createElement("span");
          cb.className = "category-badge";
          cb.textContent = a.category;
          meta.appendChild(cb);
        }
        const ds = document.createElement("span");
        ds.style.marginLeft = "auto";
        ds.textContent = fmtDate(a.created_at);
        meta.appendChild(ds);
        card.appendChild(meta);

        const btnRow = document.createElement("div");
        btnRow.className = "card-btn-row";

        const dlBtn = document.createElement("a");
        dlBtn.href = `${API_BASE_P}/api/addons/${id}/download`;
        dlBtn.className = "icon-btn";
        dlBtn.title = "Download";
        dlBtn.onclick = e => e.stopPropagation();
        dlBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
        btnRow.appendChild(dlBtn);

        if (isOwner || isAdmin) {
          const delBtn = document.createElement("button");
          delBtn.className = "icon-btn del";
          delBtn.title = "Delete";
          delBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
          delBtn.addEventListener("click", e => {
            e.stopPropagation();
            confirmDelete(a.name, async () => {
              const r = await fetch(`${API_BASE_P}/api/addons/${id}`, { method:"DELETE", headers:{ Authorization:`Bearer ${token}` } });
              if (r.status === 204) { showToast("Project deleted"); loadProfile(); }
              else showToast("Failed to delete", "error");
            });
          });
          btnRow.appendChild(delBtn);
        }

        card.appendChild(btnRow);
        card.addEventListener("click", e => {
          if (e.target.closest("a")||e.target.tagName==="BUTTON"||e.target.closest("button")) return;
          openModal({ ...a, id }, me);
        });
        list.appendChild(card);
      });
    }

    (async () => {
      await loadAnnouncement();
      await loadProfile();
    })();
  </script>
</body>
</html>
