    body { overflow-x: hidden; }
    .news-wrap { max-width: 780px; margin: 0 auto; padding: 6rem 1.5rem 3rem; position: relative; z-index: 2; }
    .news-header { margin-bottom: 2.5rem; }
    .news-header h1 { font-size: 2rem; font-weight: 700; margin: 0 0 0.3rem; }
    .news-header p { color: #555; font-size: 0.9rem; margin: 0; }
    .news-feed { display: flex; flex-direction: column; gap: 1px; }
    .news-post {
      background: rgba(10,10,10,0.75);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 1.8rem 2rem;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .news-post:hover { border-color: rgba(255,255,255,0.13); }
    .news-post-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.7rem; }
    .news-post-title { font-size: 1.2rem; font-weight: 700; color: #eee; margin: 0; }
    .news-tag { display: inline-block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 3px 9px; border-radius: 99px; background: rgba(37,100,235,0.15); border: 1px solid rgba(37,100,235,0.3); color: #90b8ff; white-space: nowrap; }
    .news-tag.green { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3); color: #4ade80; }
    .news-tag.orange { background: rgba(251,146,60,0.1); border-color: rgba(251,146,60,0.3); color: #fb923c; }
    .news-meta { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #444; margin-bottom: 1rem; }
    .news-meta a { color: #2564eb; text-decoration: none; }
    .news-meta a:hover { color: #90b8ff; }
    .news-body { color: #888; font-size: 0.9rem; line-height: 1.7; margin-bottom: 1.2rem; }
    .news-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .news-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 1.4rem 0; }
  </style>
</head>

      <a href="/dashboard.html">Dashboard</a>

        <span id="displayName" style="margin-left:8px;font-weight:600;color:#fff;cursor:pointer;display:none;"></span>
      </div>
    </nav>
  </header>

  <div id="announcement"></div>

  <div class="news-wrap">
    <div class="news-header">
      <h1>HousingBase <span class="highlight">News</span></h1>
      <p>Updates, releases, and announcements from the HousingBase team.</p>
    </div>

    <div id="adminPanel" class="news-post" style="display:none;">
  <div class="news-post-header">
    <h2 class="news-post-title">Create News Post</h2>
    <span class="news-tag">Admin</span>
  </div>

  <div class="news-divider"></div>

  <input id="newsTitle" placeholder="Title" style="width:100%;margin-bottom:10px;padding:10px;border-radius:8px;border:1px solid #333;background:#0c0c0c;color:#fff;">

  <textarea id="newsBody" placeholder="Write your update..." style="width:100%;min-height:100px;margin-bottom:10px;padding:10px;border-radius:8px;border:1px solid #333;background:#0c0c0c;color:#fff;"></textarea>

  <select id="newsTag" style="width:100%;margin-bottom:10px;padding:10px;border-radius:8px;border:1px solid #333;background:#0c0c0c;color:#fff;">

    <option value="release">Release</option>

  <button onclick="postNews()" class="primary-btn">Publish</button>
</div>

<div class="news-feed" id="newsFeed"></div>
  </div>

  <script src="script.js"></script>
<script>

const token = localStorage.getItem("token");

/* ---------- ADMIN CHECK ---------- */
async function checkAdmin() {
  const panel = document.getElementById("adminPanel");
  if (!panel) return;

  const user = await getMe();

  if (user && user.is_admin) {
    panel.style.display = "block";
  }
}

/* ---------- LOAD NEWS ---------- */
async function loadNews() {
  const feed = document.getElementById("newsFeed");
  if (!feed) return;

  const me = await getMe(); // uses your existing auth
  const res = await fetch(`${API_BASE}/api/news`);
  const posts = await res.json();

  feed.innerHTML = "";

  posts.forEach(p => {
    const tagClass =
      p.tag === "release" ? "green" :
      p.tag === "launch" ? "orange" : "";

    const date = new Date(p.created_at).toLocaleDateString();

    const el = document.createElement("article");
    el.className = "news-post";

    el.innerHTML = `
      <div class="news-post-header" style="display:flex;justify-content:space-between;align-items:center;">
        <h2 class="news-post-title">${escapeHTML(p.title)}</h2>

        <div style="display:flex;gap:8px;align-items:center;">
          <span class="news-tag ${tagClass}">${p.tag}</span>

          ${me && me.is_admin ? `
            <button class="icon-btn del" onclick="deleteNews('${p.id || p._id}')">
              ${SVG.trash}
            </button>
          ` : ""}
        </div>
      </div>

      <div class="news-meta">
        by <a href="/profile.html?user=${p.username}">@${p.username}</a>
        &middot; ${date}
      </div>

      <div class="news-divider"></div>

      <p class="news-body">${escapeHTML(p.body)}</p>
    `;

    feed.appendChild(el);
  });
}
async function deleteNews(id) {
  if (!confirm("Delete this post?")) return;

  const res = await fetch(`${API_BASE}/api/news/${id}`, {
    method: "DELETE",
    headers: {
      Authorization: "Bearer " + localStorage.getItem("authToken")
    }
  });

  if (res.ok) {
    showToast("Deleted");
    loadNews();
  } else {
    showToast("Failed", "error");
  }
}
/* ---------- POST NEWS ---------- */
async function postNews() {
  const title = document.getElementById("newsTitle").value.trim();
  const body = document.getElementById("newsBody").value.trim();
  const tag = document.getElementById("newsTag").value;

  if (!title || !body) return alert("Fill all fields");

  const res = await fetch(API_BASE + "/api/news", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + localStorage.getItem("authToken")
    },
    body: JSON.stringify({ title, body, tag })
  });

  if (!res.ok) {
    const err = await res.json();
    return alert(err.error || "Failed");
  }

  document.getElementById("newsTitle").value = "";
  document.getElementById("newsBody").value = "";

  loadNews();
}

/* ---------- ESCAPE ---------- */
function escapeHTML(str) {
  return str.replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;",
    "'":"&#039;"
  }[m]));
}

/* ---------- INIT ---------- */
checkAdmin();
loadNews();

</script>
